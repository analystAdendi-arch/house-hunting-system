version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: house-hunting-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: house-hunting-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/house-hunting
      JWT_SECRET: your_jwt_secret_key
      NODE_ENV: development
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: house-hunting-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  mongodb_data:
